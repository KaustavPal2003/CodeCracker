services:
  - type: web
    name: codecracker
    runtime: docker
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "codecracker-odbi.onrender.com"
      - key: MONGO_USERNAME
        sync: false
      - key: MONGO_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: codecracker-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: codecracker-db
          property: connectionString
      - key: APP_DOMAIN
        value: "codecracker-odbi.onrender.com"
      - key: DJANGO_COLLECTSTATIC
        value: "0"

  - type: redis
    name: codecracker-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: codecracker-db
    plan: free