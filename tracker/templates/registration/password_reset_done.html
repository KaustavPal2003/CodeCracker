{% extends "tracker/base.html" %}
{% block title %}Email Sent{% endblock %}
{% block content %}
<div style="max-width:460px;margin:3rem auto;padding:0 1rem;text-align:center">
  <div class="card">
    <p style="font-size:2.5rem;margin-bottom:.5rem">📧</p>
    <h2>Check your inbox</h2>
    <p style="color:var(--text-muted);margin:1rem 0;font-size:.9rem">
      We sent a password reset link. If you don't see it within a few minutes, check spam.
    </p>
    <a href="{% url 'tracker:login' %}" class="btn btn-primary">← Back to Login</a>
  </div>
</div>
{% endblock %}
