{% extends "tracker/base.html" %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div style="max-width:460px;margin:3rem auto;padding:0 1rem;text-align:center">
  <div class="card">
    <p style="font-size:2.5rem;margin-bottom:.5rem">✅</p>
    <h2>Password Updated!</h2>
    <p style="color:var(--text-muted);margin:1rem 0;font-size:.9rem">
      Your password has been changed. You can now log in.
    </p>
    <a href="{% url 'tracker:login' %}" class="btn btn-primary">🔑 Login</a>
  </div>
</div>
{% endblock %}
